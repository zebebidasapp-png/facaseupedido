<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faca Seu Pedido - Catalogo Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { max-width: 600px; padding: 2rem; }
        .logo { font-size: 3rem; color: #FFD700; margin-bottom: 1rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #b0b0b0; margin-bottom: 2rem; line-height: 1.6; }
        .btn { display: inline-block; padding: 1rem 2rem; background: #FFD700; color: #0a0a0a; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 0.5rem; transition: transform 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .steps { text-align: left; background: #1a1a1a; padding: 1.5rem; border-radius: 12px; margin-top: 2rem; }
        .steps h2 { color: #FFD700; margin-bottom: 1rem; }
        .steps ol { padding-left: 1.5rem; }
        .steps li { margin-bottom: 0.8rem; color: #b0b0b0; }
        .steps li strong { color: #fff; }
        .link-box { background: #1a1a1a; padding: 1rem; border-radius: 8px; margin: 1rem 0; word-break: break-all; }
        .link-box a { color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FP</div>
        <h1>Faca Seu Pedido - Catalogo Online</h1>
        <p>O catalogo esta hospedado no GitHub Pages com o novo nome do projeto.</p>

        <a href="catalogo.html" class="btn">Abrir Catalogo</a>

        <div class="steps">
            <h2>Link do catalogo</h2>
            <div class="link-box">
                <a href="https://ccepaulinho-ai.github.io/facaseupedido/catalogo.html">https://ccepaulinho-ai.github.io/facaseupedido/catalogo.html</a>
            </div>
        </div>

        <div class="steps">
            <h2>Repositorio</h2>
            <ol>
                <li><strong>Nome:</strong> facaseupedido</li>
                <li><strong>GitHub:</strong> github.com/ccepaulinho-ai/facaseupedido</li>
            </ol>
        </div>
    </div>
</body>
</html>
